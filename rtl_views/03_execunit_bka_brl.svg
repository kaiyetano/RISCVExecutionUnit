<svg xmlns="http://www.w3.org/2000/svg" width="1030" height="540" viewBox="0 0 1030 540">

<style>
  svg { font-family: Segoe UI, Arial, sans-serif; background: #fbfcfe; }
  .title { font-size: 24px; font-weight: 700; fill: #172033; }
  .subtitle { font-size: 13px; fill: #506070; }
  .box { fill: #ffffff; stroke: #26354f; stroke-width: 1.6; rx: 8; }
  .exec { fill: #eaf2ff; stroke: #235a9f; }
  .arith { fill: #fff4e5; stroke: #a76300; }
  .logic { fill: #edf8f1; stroke: #23733d; }
  .shift { fill: #f5effb; stroke: #71419a; }
  .flag { fill: #fff0f0; stroke: #a64040; }
  .label { font-size: 14px; font-weight: 650; fill: #111827; }
  .small { font-size: 12px; fill: #243044; }
  .note { font-size: 11px; fill: #5f6b7a; }
  .arrow { stroke: #374151; stroke-width: 1.8; fill: none; marker-end: url(#arrow); }
  .dash { stroke-dasharray: 5 4; }
</style>
<defs>
  <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
    <path d="M 0 0 L 10 5 L 0 10 z" fill="#374151" />
  </marker>
</defs>

<text x="32" y="38" class="title">ExecUnit architecture BKA_BRL</text>
<text x="32" y="60" class="subtitle">ExecUnit variant using BrentKung arithmetic and Brl64 shifting.</text>
<rect x="45" y="145" width="145" height="110" class="box exec"/>
<text x="59" y="169" class="label">Inputs</text>
<text x="59" y="191" class="small">A, B</text>
<text x="59" y="207" class="small">FuncClass</text>
<text x="59" y="223" class="small">operation controls</text>
<rect x="260" y="95" width="185" height="105" class="box arith"/>
<text x="274" y="119" class="label">ArithmeticUnit(BrentKung)</text>
<text x="274" y="141" class="small">add/subtract</text>
<text x="274" y="157" class="small">compare flags</text>
<text x="274" y="173" class="small">ExtWord support</text>
<rect x="260" y="245" width="185" height="92" class="box logic"/>
<text x="274" y="269" class="label">LogicUnit(Log64)</text>
<text x="274" y="291" class="small">pass B / XOR</text>
<text x="274" y="307" class="small">OR / AND</text>
<rect x="260" y="375" width="185" height="105" class="box shift"/>
<text x="274" y="399" class="label">ShiftUnit(Brl64)</text>
<text x="274" y="421" class="small">left / logical right</text>
<text x="274" y="437" class="small">arithmetic right</text>
<text x="274" y="453" class="small">ExtWord support</text>
<rect x="535" y="245" width="190" height="106" class="box exec"/>
<text x="549" y="269" class="label">FuncClass mux</text>
<text x="549" y="291" class="small">00: arithmetic</text>
<text x="549" y="307" class="small">01: logic</text>
<text x="549" y="323" class="small">10: shift</text>
<rect x="795" y="185" width="170" height="86" class="box exec"/>
<text x="809" y="209" class="label">Y output</text>
<text x="809" y="231" class="small">selected result</text>
<rect x="795" y="315" width="170" height="98" class="box flag"/>
<text x="809" y="339" class="label">Flags</text>
<text x="809" y="361" class="small">Cout, Ovfl, Zero</text>
<text x="809" y="377" class="small">AltB, AltBu</text>
<path d="M 190 180 L 260 145" class="arrow"/>
<text x="225.0" y="155.5" text-anchor="middle" class="note">A/B/control</text>
<path d="M 190 200 L 260 288" class="arrow"/>
<text x="225.0" y="237.0" text-anchor="middle" class="note">A/B/control</text>
<path d="M 190 220 L 260 425" class="arrow"/>
<text x="225.0" y="315.5" text-anchor="middle" class="note">A/B/control</text>
<path d="M 445 148 L 535 278" class="arrow"/>
<text x="490.0" y="206.0" text-anchor="middle" class="note">arith_result</text>
<path d="M 445 288 L 535 295" class="arrow"/>
<text x="490.0" y="284.5" text-anchor="middle" class="note">logic_result</text>
<path d="M 445 425 L 535 322" class="arrow"/>
<text x="490.0" y="366.5" text-anchor="middle" class="note">shift_result</text>
<path d="M 725 295 L 795 228" class="arrow"/>
<text x="760.0" y="254.5" text-anchor="middle" class="note">Y_int</text>
<path d="M 445 174 L 795 365" class="arrow dash"/>
<text x="620.0" y="262.5" text-anchor="middle" class="note">arith flags</text>
</svg>
