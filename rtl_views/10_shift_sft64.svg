<svg xmlns="http://www.w3.org/2000/svg" width="880" height="460" viewBox="0 0 880 460">

<style>
  svg { font-family: Segoe UI, Arial, sans-serif; background: #fbfcfe; }
  .title { font-size: 24px; font-weight: 700; fill: #172033; }
  .subtitle { font-size: 13px; fill: #506070; }
  .box { fill: #ffffff; stroke: #26354f; stroke-width: 1.6; rx: 8; }
  .exec { fill: #eaf2ff; stroke: #235a9f; }
  .arith { fill: #fff4e5; stroke: #a76300; }
  .logic { fill: #edf8f1; stroke: #23733d; }
  .shift { fill: #f5effb; stroke: #71419a; }
  .flag { fill: #fff0f0; stroke: #a64040; }
  .label { font-size: 14px; font-weight: 650; fill: #111827; }
  .small { font-size: 12px; fill: #243044; }
  .note { font-size: 11px; fill: #5f6b7a; }
  .arrow { stroke: #374151; stroke-width: 1.8; fill: none; marker-end: url(#arrow); }
  .dash { stroke-dasharray: 5 4; }
</style>
<defs>
  <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
    <path d="M 0 0 L 10 5 L 0 10 z" fill="#374151" />
  </marker>
</defs>

<text x="32" y="38" class="title">ShiftUnit architecture Sft64</text>
<text x="32" y="60" class="subtitle">Shift architecture using numeric_std shift operations for full-width and ExtWord half-width operations.</text>
<rect x="55" y="150" width="170" height="110" class="box exec"/>
<text x="69" y="174" class="label">Inputs</text>
<text x="69" y="196" class="small">A, B shift amount</text>
<text x="69" y="212" class="small">ShiftFN, ExtWord</text>
<rect x="300" y="95" width="230" height="118" class="box shift"/>
<text x="314" y="119" class="label">ExtWord path</text>
<text x="314" y="141" class="small">use low N/2 bits</text>
<text x="314" y="157" class="small">shift_left/right functions</text>
<text x="314" y="173" class="small">sign-extend result</text>
<rect x="300" y="275" width="230" height="118" class="box shift"/>
<text x="314" y="299" class="label">Full-width path</text>
<text x="314" y="321" class="small">numeric_std shift_left</text>
<text x="314" y="337" class="small">logical shift_right</text>
<text x="314" y="353" class="small">signed shift_right</text>
<rect x="620" y="195" width="180" height="92" class="box exec"/>
<text x="634" y="219" class="label">Output mux</text>
<text x="634" y="241" class="small">ExtWord selects</text>
<text x="634" y="257" class="small">half or full result</text>
<path d="M 225 195 L 300 150" class="arrow"/>
<text x="262.5" y="165.5" text-anchor="middle" class="note">ExtWord=1</text>
<path d="M 225 210 L 300 330" class="arrow"/>
<text x="262.5" y="263.0" text-anchor="middle" class="note">ExtWord=0</text>
<path d="M 530 154 L 620 220" class="arrow"/>
<text x="575.0" y="180.0" text-anchor="middle" class="note">half result</text>
<path d="M 530 334 L 620 245" class="arrow"/>
<text x="575.0" y="282.5" text-anchor="middle" class="note">full result</text>
</svg>
