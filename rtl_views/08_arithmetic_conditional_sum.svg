<svg xmlns="http://www.w3.org/2000/svg" width="1040" height="450" viewBox="0 0 1040 450">

<style>
  svg { font-family: Segoe UI, Arial, sans-serif; background: #fbfcfe; }
  .title { font-size: 24px; font-weight: 700; fill: #172033; }
  .subtitle { font-size: 13px; fill: #506070; }
  .box { fill: #ffffff; stroke: #26354f; stroke-width: 1.6; rx: 8; }
  .exec { fill: #eaf2ff; stroke: #235a9f; }
  .arith { fill: #fff4e5; stroke: #a76300; }
  .logic { fill: #edf8f1; stroke: #23733d; }
  .shift { fill: #f5effb; stroke: #71419a; }
  .flag { fill: #fff0f0; stroke: #a64040; }
  .label { font-size: 14px; font-weight: 650; fill: #111827; }
  .small { font-size: 12px; fill: #243044; }
  .note { font-size: 11px; fill: #5f6b7a; }
  .arrow { stroke: #374151; stroke-width: 1.8; fill: none; marker-end: url(#arrow); }
  .dash { stroke-dasharray: 5 4; }
</style>
<defs>
  <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
    <path d="M 0 0 L 10 5 L 0 10 z" fill="#374151" />
  </marker>
</defs>

<text x="32" y="38" class="title">ArithmeticUnit architecture ConditionalSum</text>
<text x="32" y="60" class="subtitle">Conditional-sum architecture that recursively computes the low half and precomputes both upper-half carry assumptions.</text>
<rect x="55" y="155" width="165" height="94" class="box exec"/>
<text x="69" y="179" class="label">Preprocess</text>
<text x="69" y="201" class="small">B xor AddnSub</text>
<text x="69" y="217" class="small">half carry for ExtWord</text>
<rect x="285" y="100" width="190" height="116" class="box arith"/>
<text x="299" y="124" class="label">Recursive low half</text>
<text x="299" y="146" class="small">ArithmeticUnit(N/2)</text>
<text x="299" y="162" class="small">computes S_lo and C_lo</text>
<rect x="285" y="260" width="190" height="122" class="box arith"/>
<text x="299" y="284" class="label">Upper half guesses</text>
<text x="299" y="306" class="small">carry-in 0 path</text>
<text x="299" y="322" class="small">carry-in 1 path</text>
<text x="299" y="338" class="small">local ripple logic</text>
<rect x="560" y="170" width="170" height="98" class="box exec"/>
<text x="574" y="194" class="label">Select by C_lo</text>
<text x="574" y="216" class="small">choose S_hi</text>
<text x="574" y="232" class="small">Cout and Ovfl</text>
<rect x="800" y="165" width="180" height="108" class="box flag"/>
<text x="814" y="189" class="label">Final outputs</text>
<text x="814" y="211" class="small">S_hi &amp; S_lo</text>
<text x="814" y="227" class="small">ExtWord selection</text>
<text x="814" y="243" class="small">flags</text>
<path d="M 220 195 L 285 155" class="arrow"/>
<text x="252.5" y="168.0" text-anchor="middle" class="note">low bits</text>
<path d="M 220 195 L 285 315" class="arrow"/>
<text x="252.5" y="248.0" text-anchor="middle" class="note">upper bits</text>
<path d="M 475 158 L 560 195" class="arrow"/>
<text x="517.5" y="169.5" text-anchor="middle" class="note">C_lo</text>
<path d="M 475 320 L 560 220" class="arrow"/>
<text x="517.5" y="263.0" text-anchor="middle" class="note">two candidates</text>
<path d="M 730 210 L 800 210" class="arrow"/>
<text x="765.0" y="203.0" text-anchor="middle" class="note">selected sum</text>
</svg>
