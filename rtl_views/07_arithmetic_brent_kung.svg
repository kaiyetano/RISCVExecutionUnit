<svg xmlns="http://www.w3.org/2000/svg" width="1060" height="430" viewBox="0 0 1060 430">

<style>
  svg { font-family: Segoe UI, Arial, sans-serif; background: #fbfcfe; }
  .title { font-size: 24px; font-weight: 700; fill: #172033; }
  .subtitle { font-size: 13px; fill: #506070; }
  .box { fill: #ffffff; stroke: #26354f; stroke-width: 1.6; rx: 8; }
  .exec { fill: #eaf2ff; stroke: #235a9f; }
  .arith { fill: #fff4e5; stroke: #a76300; }
  .logic { fill: #edf8f1; stroke: #23733d; }
  .shift { fill: #f5effb; stroke: #71419a; }
  .flag { fill: #fff0f0; stroke: #a64040; }
  .label { font-size: 14px; font-weight: 650; fill: #111827; }
  .small { font-size: 12px; fill: #243044; }
  .note { font-size: 11px; fill: #5f6b7a; }
  .arrow { stroke: #374151; stroke-width: 1.8; fill: none; marker-end: url(#arrow); }
  .dash { stroke-dasharray: 5 4; }
</style>
<defs>
  <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
    <path d="M 0 0 L 10 5 L 0 10 z" fill="#374151" />
  </marker>
</defs>

<text x="32" y="38" class="title">ArithmeticUnit architecture BrentKung</text>
<text x="32" y="60" class="subtitle">Prefix-adder implementation that builds generate/propagate trees and reconstructs carries for fast add/subtract.</text>
<rect x="55" y="140" width="155" height="94" class="box exec"/>
<text x="69" y="164" class="label">Preprocess</text>
<text x="69" y="186" class="small">B xor AddnSub</text>
<text x="69" y="202" class="small">pad to power-of-two M</text>
<rect x="285" y="100" width="195" height="110" class="box arith"/>
<text x="299" y="124" class="label">G/P level 0</text>
<text x="299" y="146" class="small">G = A and B</text>
<text x="299" y="162" class="small">P = A xor B</text>
<rect x="540" y="92" width="220" height="132" class="box arith"/>
<text x="554" y="116" class="label">Forward prefix tree</text>
<text x="554" y="138" class="small">log2(M) stages</text>
<text x="554" y="154" class="small">combine generate/propagate</text>
<text x="554" y="170" class="small">Brent-Kung style grouping</text>
<rect x="540" y="280" width="220" height="92" class="box arith"/>
<text x="554" y="304" class="label">Carry reconstruction</text>
<text x="554" y="326" class="small">even carries</text>
<text x="554" y="342" class="small">odd carries</text>
<rect x="825" y="160" width="175" height="110" class="box flag"/>
<text x="839" y="184" class="label">Sum / flags</text>
<text x="839" y="206" class="small">S = P xor carry</text>
<text x="839" y="222" class="small">Cout/Ovfl/Zero</text>
<text x="839" y="238" class="small">AltB/AltBu</text>
<path d="M 210 180 L 285 155" class="arrow"/>
<text x="247.5" y="160.5" text-anchor="middle" class="note">padded operands</text>
<path d="M 480 155 L 540 150" class="arrow"/>
<text x="510.0" y="145.5" text-anchor="middle" class="note">G/P</text>
<path d="M 650 224 L 650 280" class="arrow"/>
<text x="650.0" y="245.0" text-anchor="middle" class="note">prefix data</text>
<path d="M 760 326 L 825 215" class="arrow"/>
<text x="792.5" y="263.5" text-anchor="middle" class="note">carries</text>
<path d="M 760 150 L 825 180" class="arrow"/>
<text x="792.5" y="158.0" text-anchor="middle" class="note">P/G</text>
</svg>
