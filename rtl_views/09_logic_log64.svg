<svg xmlns="http://www.w3.org/2000/svg" width="900" height="360" viewBox="0 0 900 360">

<style>
  svg { font-family: Segoe UI, Arial, sans-serif; background: #fbfcfe; }
  .title { font-size: 24px; font-weight: 700; fill: #172033; }
  .subtitle { font-size: 13px; fill: #506070; }
  .box { fill: #ffffff; stroke: #26354f; stroke-width: 1.6; rx: 8; }
  .exec { fill: #eaf2ff; stroke: #235a9f; }
  .arith { fill: #fff4e5; stroke: #a76300; }
  .logic { fill: #edf8f1; stroke: #23733d; }
  .shift { fill: #f5effb; stroke: #71419a; }
  .flag { fill: #fff0f0; stroke: #a64040; }
  .label { font-size: 14px; font-weight: 650; fill: #111827; }
  .small { font-size: 12px; fill: #243044; }
  .note { font-size: 11px; fill: #5f6b7a; }
  .arrow { stroke: #374151; stroke-width: 1.8; fill: none; marker-end: url(#arrow); }
  .dash { stroke-dasharray: 5 4; }
</style>
<defs>
  <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
    <path d="M 0 0 L 10 5 L 0 10 z" fill="#374151" />
  </marker>
</defs>

<text x="32" y="38" class="title">LogicUnit architecture Log64</text>
<text x="32" y="60" class="subtitle">Logic architecture selecting pass-through, XOR, OR, or AND from the LogicFN control field.</text>
<rect x="80" y="140" width="170" height="110" class="box exec"/>
<text x="94" y="164" class="label">Inputs</text>
<text x="94" y="186" class="small">A, B</text>
<text x="94" y="202" class="small">LogicFN</text>
<rect x="340" y="110" width="230" height="158" class="box logic"/>
<text x="354" y="134" class="label">case LogicFN</text>
<text x="354" y="156" class="small">00: B</text>
<text x="354" y="172" class="small">01: A xor B</text>
<text x="354" y="188" class="small">10: A or B</text>
<text x="354" y="204" class="small">11: A and B</text>
<rect x="665" y="150" width="155" height="78" class="box exec"/>
<text x="679" y="174" class="label">Y output</text>
<text x="679" y="196" class="small">selected logic result</text>
<path d="M 250 195 L 340 190" class="arrow"/>
<text x="295.0" y="185.5" text-anchor="middle" class="note">A/B/FN</text>
<path d="M 570 190 L 665 190" class="arrow"/>
<text x="617.5" y="183.0" text-anchor="middle" class="note">Y</text>
</svg>
