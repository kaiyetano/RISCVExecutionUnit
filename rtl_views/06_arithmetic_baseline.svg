<svg xmlns="http://www.w3.org/2000/svg" width="1060" height="390" viewBox="0 0 1060 390">

<style>
  svg { font-family: Segoe UI, Arial, sans-serif; background: #fbfcfe; }
  .title { font-size: 24px; font-weight: 700; fill: #172033; }
  .subtitle { font-size: 13px; fill: #506070; }
  .box { fill: #ffffff; stroke: #26354f; stroke-width: 1.6; rx: 8; }
  .exec { fill: #eaf2ff; stroke: #235a9f; }
  .arith { fill: #fff4e5; stroke: #a76300; }
  .logic { fill: #edf8f1; stroke: #23733d; }
  .shift { fill: #f5effb; stroke: #71419a; }
  .flag { fill: #fff0f0; stroke: #a64040; }
  .label { font-size: 14px; font-weight: 650; fill: #111827; }
  .small { font-size: 12px; fill: #243044; }
  .note { font-size: 11px; fill: #5f6b7a; }
  .arrow { stroke: #374151; stroke-width: 1.8; fill: none; marker-end: url(#arrow); }
  .dash { stroke-dasharray: 5 4; }
</style>
<defs>
  <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
    <path d="M 0 0 L 10 5 L 0 10 z" fill="#374151" />
  </marker>
</defs>

<text x="32" y="38" class="title">ArithmeticUnit architecture Baseline</text>
<text x="32" y="60" class="subtitle">Ripple-carry arithmetic implementation with add/subtract, word extension, and comparison flags.</text>
<rect x="70" y="150" width="160" height="96" class="box exec"/>
<text x="84" y="174" class="label">A and B</text>
<text x="84" y="196" class="small">B xor AddnSub</text>
<text x="84" y="212" class="small">carry(0)=AddnSub</text>
<rect x="300" y="110" width="210" height="145" class="box arith"/>
<text x="314" y="134" class="label">Ripple generate loop</text>
<text x="314" y="156" class="small">generate = A and B_xor</text>
<text x="314" y="172" class="small">propagate = A xor B_xor</text>
<text x="314" y="188" class="small">carry[i+1] chain</text>
<rect x="575" y="135" width="200" height="115" class="box flag"/>
<text x="589" y="159" class="label">Result / flags</text>
<text x="589" y="181" class="small">S_int = A xor B xor carry</text>
<text x="589" y="197" class="small">Cout, Ovfl, Zero</text>
<text x="589" y="213" class="small">AltB, AltBu</text>
<rect x="845" y="160" width="155" height="78" class="box exec"/>
<text x="859" y="184" class="label">ExtWord mux</text>
<text x="859" y="206" class="small">full N-bit or</text>
<text x="859" y="222" class="small">sign-extended N/2</text>
<path d="M 230 190 L 300 175" class="arrow"/>
<text x="265.0" y="175.5" text-anchor="middle" class="note">operands</text>
<path d="M 510 178 L 575 178" class="arrow"/>
<text x="542.5" y="171.0" text-anchor="middle" class="note">sum/carry</text>
<path d="M 775 192 L 845 192" class="arrow"/>
<text x="810.0" y="185.0" text-anchor="middle" class="note">selected width</text>
</svg>
